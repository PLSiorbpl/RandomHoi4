l_english:
 CHS_focus_1:0 "Calm down the situation"
 CHS_focus_1_desc:0 "The civil unrest in the north is getting stronger and less controllable"
 
 CHS_focus_2:0 "Strengthen the police"
 CHS_focus_2_desc:0 "The police is the only force that can stop the riots in the north. We need to give them more power and resources to do their job"
 
 CHS_focus_3:0 "Declare martial law"
 CHS_focus_3_desc:0 "In order to restore order in the region, we may need to declare martial law and take more direct control. Wielgusans are getting more and more aggressive, and we need to show them that we are in charge"
 
 CHS_focus_4:0 "Hard crackdown"
 CHS_focus_4_desc:0 "We will not be intimidated by WLF or the outdated generals."
 
 CHS_focus_5:0 "Military siezes control"
 CHS_focus_5_desc:0 "Military has to take things in thier own hands before it's too late"
 
 CHS_focus_6:0 "Restore order"
 CHS_focus_6_desc:0 "Anyone opposing us will be treated as a threat. Order must be restored at all costs"
 
 CHS_focus_7:0 "Send secret police"
 CHS_focus_7_desc:0 "We have located one of the main leaders of the rebellion, we need to send secret police and bring him to court. This will send a message to the rest of the rebels that we are not afraid to use force and that we will not tolerate any dissent"
 
 CHS_focus_8:0 "Fire has risen!"
 CHS_focus_8_desc:0 "With the killing of the WLF leader region plundured to voilence and chaos. All of the known forces were overrun."
 
 CHS_focus_9:0 "Focus on the president guards"
 CHS_focus_9_desc:0 "They remain loyal to the president rather than the nation. We must eliminate their influence"
 
 CHS_focus_10:0 "The president's hideout"
 CHS_focus_10_desc:0 "We need to get rid of the president and his loyalists. They are the ones who are responsible for this mess"
 
 CHS_focus_11:0 "Stablilise the situation"
 CHS_focus_11_desc:0 "Cease all police operations and enforce a nationwide ceasefire"
 
 CHS_focus_12:0 "We did it"
 CHS_focus_12_desc:0 "After dealing with traitors and the president we can move on and create a better future for our country"
 
 CHS_focus_13:0 "Freedom for everyone"
 CHS_focus_13_desc:0 "Allow other parties to participate in governance. The military will step down from political theatre and let the people of Chruszczyna decide their future"
 
 CHS_focus_14:0 "Bastion of democracy"
 CHS_focus_14_desc:0 "We need to show the world that we are a democratic country and that we care about our people. We need to work on improving our relations with other democratic countries"
 
 CHS_focus_15:0 "Trade with Pazmiech" 
 CHS_focus_15_desc:0 "Pazmiech is a small country that is located near us. They have a lot of resources that we need, and they are willing to trade with us. We need to establish good relations with them and start trading"
 
 CHS_focus_16:0 "Rewrite constitution"
 CHS_focus_16_desc:0 "The constitution is outdated and no longer reflects the current situation. It must be rewritten to relfect the new reality and to ensure that the rights of the people are protected"
 
 CHS_focus_17:0 "Release political prisoners"
 CHS_focus_17_desc:0 "They fought with corruption and for the people, they are the true heroes of our country. We need to release them and give them the respect they deserve"
 
 CHS_focus_18:0 "Adopt civil rights"
 CHS_focus_18_desc:0 "Kazimierza pushed for civil rights for years, but previous leaders ignored the people in pursuit of profit"
 
 CHS_focus_19:0 "Free again"
 CHS_focus_19_desc:0 "We have done it... Free from everything"

 CHS_focus_20:0 "Disarm the society"
 CHS_focus_20_desc:0 "Our society is way to millitarised. They will return the guns in exchange for money"
 CHS_focus_21:0 "Seek for help from the world"
  CHS_focus_21_desc:0 "After Brutal war with Wielgus and Donosy we need to send out cry for help."
 CHS_focus_22:0 "Recruit irregular militias"
  CHS_focus_22_desc:0 "We need to recruit more people to join our cause and to help us fight against the WLF."