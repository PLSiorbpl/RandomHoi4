l_english:
 ZAP_focus_1:0 "Calm down the situation"
 ZAP_focus_1_desc:0 "The civil unrest in the north is getting stronger and less controllable."
 
 ZAP_focus_2:0 "Strengthen the police"
 ZAP_focus_2_desc:0 "The police is the only force that can stop the riots in the north. We need to give them more power and resources to do their job."
 
 ZAP_focus_3:0 "Declare martial law"
 ZAP_focus_3_desc:0 "In order to restore order in the region, we may need to declare martial law and take more direct control. Wielgusans are getting more and more aggressive, and we need to show them that we are in charge."
 
 ZAP_focus_4:0 "Hard crackdown"
 ZAP_focus_4_desc:0 "We will not be intimidated by outdated generals and Wielgusans. We are Chruszczyna!" 
 
 ZAP_focus_5:0 "Military seizes control"
 ZAP_focus_5_desc:0 "Military has to take things in their own hands before it's too late."
 
 ZAP_focus_6:0 "Do not let them spread"
 ZAP_focus_6_desc:0 "All of our plans so far has faild us, we need to take more drastic measures to stop the rebels. We need to contain them and stop them from spreading their influence to other parts of the country."
 
 ZAP_focus_7:0 "Send secret police"
 ZAP_focus_7_desc:0 "We have to send liquidation teams to eliminate the organizers."
 
 ZAP_focus_8:0 "Fire has risen!"
 ZAP_focus_8_desc:0 "Anyone who opposes us is a traitor and a threat to national security. We have to take extreme measures to protect our country."
 
 ZAP_focus_9:0 "Focus on the president guards"
 ZAP_focus_9_desc:0 "They remain loyal to the president and cannot be trusted. The secret police will deal with them."
 
 ZAP_focus_10:0 "The president's hideout"
 ZAP_focus_10_desc:0 "We need to get rid of the president and his loyalists. They are the ones who are responsible for this mess."
 
 ZAP_focus_11:0 "Stabilize the situation"
 ZAP_focus_11_desc:0 "Stop all police action, and declare a nationwide ceasefire."
 
 ZAP_focus_12:0 "We did it"
 ZAP_focus_12_desc:0 "After dealing with traitors and the president we can move on and create a better future for our country."
 
 ZAP_focus_13:0 "More than one option"
 ZAP_focus_13_desc:0 "Military has to step down and let the people decide what they want."
 
 ZAP_focus_14:0 "Bastion of democracy"
 ZAP_focus_14_desc:0 "We need to show the world that we are a democratic country and that we care about our people. We need to work on improving our relations with other democratic countries."
 
 ZAP_focus_15:0 "Trade with Pazmiech" 
 ZAP_focus_15_desc:0 "Pazmiech is a small country that is located near us. They have a lot of resources that we need, and they are willing to trade with us. We need to establish good relations with them and start trading."
 
 ZAP_focus_16:0 "Rewrite constitution"
 ZAP_focus_16_desc:0 "The constitution is outdated and no longer reflects the current situation. It must be rewritten."
 
 ZAP_focus_17:0 "Release political prisoners"
 ZAP_focus_17_desc:0 "They fought against corruption and for the people. They are the true heroes of our country. We need to release them and give them the respect they deserve."
 
 ZAP_focus_18:0 "Adopt civil rights"
 ZAP_focus_18_desc:0 "Kazimierza pressed our country for years to adopt civil rights but our leaders didn't care about people they pursued profit."
 
 ZAP_focus_19:0 "Free again"
 ZAP_focus_19_desc:0 "We have done it... Free from everything."
 
 ZAP_focus_20:0 "Dissolve militias"
 ZAP_focus_20_desc:0 "Militias pose a threat to democracy. They must be dissolved or integrated into official forces."
 
 ZAP_focus_21:0 "Seek for help from the world"
 ZAP_focus_21_desc:0 "We need to seek help from other countries to rebuild our country and to improve our relations with them. We need to show that we are a responsible member of the international community and that we care about our people."
 
 ZAP_focus_22:0 "Recruit irregular militias"
 ZAP_focus_22_desc:0 "We need to recruit more people to join our cause and to help us fight against the rebels."