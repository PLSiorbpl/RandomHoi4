l_english:
 PRZ_economy_situation.1.t:0 "We need to look at our curently economix situation"
 PRZ_economy_situation.1.d:0 "After the shatter of Proszowice Empire much of out industries disappeared from our nation. Our peaple are lazy, tools not efficent and main factories are not being used. We need to do somethink about it before it gets worse."
 PRZ_economy_situation.1.a:0 "Let'begin fixing this"

 PRZ_Shining_economy.1.t:0 "Shining economy"
 PRZ_Shining_economy.1.d:0 "Economy is growing and shining like sun on the sky, nothink can stop us now, Proszowice economy is unstopableadn have best efficency ever know to this lands."
 PRZ_Shining_economy.1.a:0 "As we planed, everythink is great"
 Proszowice:0 "REPLACE_ME"

 PRZ_comunism_rising:0 "Rising communism support"
 PRZ_comunism_rising_desc:0 "After the fall of Proszowice, people did not trust the Emperor, support for communism and the desire to overthrow the incompetent ruler began to grow among the people"

 PRZ_United_Empire:0 "United Empire"
 PRZ_United_Empire_desc:0 "After years of rebellion and chaos, the Proszowice Empire has been reunited under a single authority. Its former provinces are once again under government control, and the state is regaining its strength and ambition to once again become the dominant power in the region."

 PRZ_Shatered_Empire:0 "Shatered Empire"
 PRZ_Shatered_Empire_desc:0 "After the rebelions of Topola and other conquered lands The Empire begins falling apart, its juts begining of the new era... or end."
 PRZ_Shatered_Empire_tt:0 "Empire is colapsing"

 PRZ_Look_at_the_people:0 "Look at the peaple"
 PRZ_Look_at_the_people_desc:0 "REPLACE_ME"
 PRZ_Look_at_the_people_tt:0 "REPLACE_ME"

 PRZ_Empire_Propaganda:0 "Empire Propaganda"
 PRZ_Empire_Propaganda_desc:0 "After closly watching and hearing peaple its easly noticable that they planing communist coup on our Gret Emperor. We need start propaganda campaign to clear their mind from these corupted by socialism thoughts,"
 PRZ_Empire_Propaganda_tt:0 "Starting propaganda campaign"
 
 PRZ_Executions:0 "Executions"
 PRZ_Executions_desc:0 "After closly watching and hearing peaple its easly noticable that they planing communist coup on our Gret Emperor. We localizated big amount of traitors and begin executing them. The executions were carried out as an exercise in the soldiers' marksmanship. Clearing that amount of "traitors" surly slowed revolution. It was good move, surly?"
 PRZ_Executions:0 "Removing traitors."

 PRZ_Prepare_for_Reunification:0 " Prepare for Reunification"
 PRZ_Prepare_for_Reunification_desc:0 "We need to unify our empire, we can't allow our people to live under fake flag and fake goverment. But who gona unite Proszowice? Same Emperor who destroyed it last time, or maybe will of people gona overthrown him?"
 PRZ_Prepare_for_Reunification_tt:0 "Begin of balance of powers."

 PRZ_Repair_Infrastructur:0 "Repair Infrastructure"
 PRZ_Repair_Infrastructur_desc:0 "After colapse of Proszowice our infrastructure is poorly developed, Let's begind fixing it."
 PRZ_Repair_Infrastructur_tt:0 "Fixing roads."

 PRZ_Develop_Capital:0 "Develop Capital"
 PRZ_Develop_Capital_desc:0 "Not only infrastructure is almost non existing but also our cities are poorly looking. Let's start development from most important one."
 PRZ_Develop_Capital_tt:0 "Developing Capital."

 PRZ_Expand_air_and_navy_basses:0 "Expand air and navy basses"
 PRZ_Expand_air_and_navy_basses_desc:0 "After losing almost all of our ports and air basses we need to create new. A lot of new for expanding our Empire."
 PRZ_Expand_air_and_navy_basses_tt:0 "Building air and navy basses."

 PRZ_Further_expansion_of_air_basses:0 "Further expansion of air basses"
 PRZ_Further_expansion_of_air_basses_desc:0 "Let's build even more air basses."
 PRZ_Further_expansion_of_air_basses_tt:0 "Building air basses."

 PRZ_Further_expansion_of_naval_basses:0 "Further expansion of navy basses"
 PRZ_Further_expansion_of_naval_basses_desc:0 "Let's build even more air basses"
 PRZ_Further_expansion_of_naval_basses_tt:0 "Building navy basses."

 PRZ_Finalazing_air_and_navy_basses_expansion:0 "Finalazing air nad navy expansion"
 PRZ_Finalazing_air_and_navy_basses_expansion_desc:0 "Final construction of air adn naval basses. Let's hope its enough."
 PRZ_Finalazing_air_and_navy_basses_expansion_tt:0 "Building air and navy basses, again."

 PRZ_Develop_Minor_Cities:0 "Develop Minor Cities"
 PRZ_Develop_Minor_Cities_desc:0 "Let's focus on smaller cities, for our people."
 PRZ_Develop_Minor_Cities_tt:0 "Focusing on small cities."

 PRZ_Expand_Agriculture:0 "Expand Agriculture"
 PRZ_Expand_Agriculture_desc:0 "Maybe Proszowice fallen becouse of bad agriculture? Lets hope we fixed that problem"
 PRZ_Expand_Agriculture_tt:0 "Creating Agricuture"

 PRZ_Develop_Major_Cities:0 "Develop Major Cities"
 PRZ_Develop_Major_Cities_desc:0 "Let's focus on biggier cities, for the Empire."
 PRZ_Develop_Major_Cities_tt:0 "Focusing on bigger cities"

 PRZ_Expand_Arms_Facilities:0 "Expand Arms Facilities"
 PRZ_Expand_Arms_Facilities_desc:0 "Proszowice needs more guns, let's expand main arms factories."
 PRZ_Expand_Arms_Facilities_tt:0 "Expanding arms facilities."

 PRZ_Imperial_Factories:0 "Imperial Factories"
 PRZ_Imperial_Factories_desc:0 "After uniting Proszowice we can finally fix our economy deeper. First we need to focus on reorganizing new factories."
 PRZ_Imperial_Factories_tt:0 "Fixinf economy."

 PRZ_Imperial_Efficency:0 "Imperial Efficency"
 PRZ_Imperial_Efficency_desc:0 "After reorganizing new factories we need to focus on efficency, our specialist are working on it."
 PRZ_Imperial_Efficency_tt:0 "Improving Efficency."

 PRZ_Imperial_Quality:0 "Imperial Quality"
 PRZ_Imperial_Quality_desc:0 "Efficency is not all, quality is just as important, main factories managers are working on improving it."
 PRZ_Imperial_Quality_tt:0 "Improving quality."

 PRZ_Shining_Economy:0 "Shining Economy"
 PRZ_Shining_Economy_desc:0 "As we planed, Proszowice Economy is growing unstopable, factories are working 24/7 withour break and workers dont know what rest is. Everythink is awesome. Our economy is shining like a sun on the sky."
 PRZ_Shining_Economy_tt:0 "Glazing economy."

 PRZ_Destroyed_Economy:0 "Destroyed Economy"
 PRZ_Destroyed_Economy_desc:0 "Let's investigate our economis situation better."
 PRZ_Destroyed_Economy_tt:0 "Checking economy."

 PRZ_Rally_Workers_to_job:0 "Rally Workers to job"
 PRZ_Rally_Workers_to_job_desc:0 "First and biggest problem is lazines of our people. After few forced labor and changing laws evrythink comes back to normal."
 PRZ_Rally_Workers_to_job_tt:0 "Effect changing: -30% consumer goods"

 PRZ_Buy_new_tools:0 "Buy new tools"
 PRZ_Buy_new_tools_desc:0 "Most of our tools was on others islands, we need to somehow get other tools for proundly working people."
 PRZ_Buy_new_tools_tt:0 "Getting new tools"