 # Kobylniki Eventy
 kob_proboszcz.1.t: "Proboszcz Marian Fatyga is leaving"
 kob_proboszcz.1.d: "For years, Proboszcz Marian Fatyga has been a pillar of stability in our community. A calm voice in times of unrestand a quiet but firm influence on local affairs.\n You must take a side to guarantee your party's victory"
 kob_proboszcz.1.a: "Mourning in the country"
 kob_proboszcz.1.b: "I didn't like him anyway"
 kob_proboszcz.1.c: "I have no opinion on this"

 kob_Soltys.1.t:0 "Soltys of Kobylniki is retiring"
 kob_Soltys.1.d:0 "After 45 years of continious rulling Soltys finally retires. He was one of the most beloved Soltys in entire Kobylniki History. He builded Kaplica and funded small primary school in his early years."
 kob_Soltys.1.a:0 "Make situation good for your party"
 kob_Soltys.1.b:0 "Organize day off from work"
 kob_Soltys.1.c:0 "He was really good Soltys"
 kob_Soltys.1.e:0 "We didnt like him really"

 kob_Ziemniaki.1.t:0 "A Catastrophic Potato Harvest in Kobylniki"
 kob_Ziemniaki.1.d:0 "This year's potato harvest in Kobylniki has proven to be one of the worst in living memory. Fields lie barren, yields have plummeted, and concern is spreading rapidly among both officials and the population.\n\nExperts warn that without immediate action, the potato market may collapse entirely, risking economic instability and widespread shortages."
 kob_Ziemniaki.1.a:0 "This is a disaster"
 kob_Ziemniaki.1.b:0 "We will monitor the situation"

 kob_Komunizm.1.t:0 "Communists Won elections in Kobylniki"
 kob_Komunizm.1.d:0 "Following Soltys' retirement, Kobylniki held elections with three major parties competing: KOP, SPAW, and CPP. Ultimately, the Communism Political Circle (KOP emerged victorious, shaping the nation's political future!"
 kob_Komunizm.1.a:0 "For our victory"
 kob_Komunizm.1.b:0 "Slava communism"
 kob_Komunizm.1.c:0 "I hate communism"

