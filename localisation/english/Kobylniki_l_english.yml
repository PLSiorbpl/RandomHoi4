# Kobylniki Eventy
 kob_proboszcz.1.t: "Parish priest Marian Fatyga is leaving"
 kob_proboszcz.1.d: "For years, Parish Priest Marian Fatyga has been a pillar of stability in our community. A calm voice in times of unrestand a quiet but firm influence on local affairs.\n You must take a side to guarantee your party's victory"
 kob_proboszcz.1.a: "Mourning in the country"
 kob_proboszcz.1.b: "I didn't like him anyway"
